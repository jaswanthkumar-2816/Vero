<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vero AI - Results</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #10b981;
            --secondary: #8b5cf6;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 2rem;
            text-align: center;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            align-items: center;
        }

        .back-btn {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .table-container {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid #334155;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        th {
            text-align: left;
            background: #334155;
            padding: 1rem;
            color: var(--text-dim);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        td {
            padding: 1rem;
            border-top: 1px solid #334155;
            font-size: 0.9rem;
        }

        .score {
            font-weight: 800;
            color: var(--primary);
        }

        .count-badge {
            background: #374151;
            color: #94a3b8;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
        }

        .skills-cell {
            font-size: 0.75rem;
            color: var(--text-dim);
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #334155;
            text-align: center;
        }

        .stat-val {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body>
    <div class="container" id="main">
        <div class="controls">
            <a href="index.html" class="back-btn">← New Upload</a>
            <div style="display: flex; gap: 15px; align-items: center;">
                <span id="countMsg">Finding matching candidates...</span>
                <button onclick="exportCSV()"
                    style="padding: 8px 16px; background: #334155; color: white; border: 1px solid #475569; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; transition: 0.2s;"
                    onmouseover="this.style.background='#475569'" onmouseout="this.style.background='#334155'">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y1="3" />
                    </svg>
                    Export CSV
                </button>
            </div>
        </div>
        <h1>Step 3: Filtered Results</h1>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-val" id="stat-total">0</div>
                <div class="stat-label">Total Filtered</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="stat-avg">0%</div>
                <div class="stat-label">Average Score</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="stat-high">0%</div>
                <div class="stat-label">Highest Score</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="stat-skill">N/A</div>
                <div class="stat-label">Common Skill</div>
            </div>
        </div>

        <div
            style="background: rgba(16, 185, 129, 0.05); padding: 1rem; border-radius: 8px; border: 1px solid rgba(16, 185, 129, 0.2); margin-bottom: 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 15px;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div style="font-weight: 700; color: var(--primary); font-size: 0.9rem; text-transform: uppercase;">Bulk
                    Actions</div>
                <div
                    style="font-size: 0.75rem; color: var(--text-dim); background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 4px;">
                    Take control of multiple candidates instantly</div>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <!-- Explicit Buttons as requested -->
                <button onclick="runBatchAction(80, 'gt', 'shortlisted')"
                    style="padding: 8px 16px; background: rgba(16, 185, 129, 0.15); color: var(--primary); border: 1px solid var(--primary); border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 0.85rem; transition: 0.2s;"
                    onmouseover="this.style.background='var(--primary)'; this.style.color='#010409'"
                    onmouseout="this.style.background='rgba(16, 185, 129, 0.15)'; this.style.color='var(--primary)'">
                    Shortlist > 80%
                </button>

                <button onclick="runBatchAction(50, 'lt', 'rejected')"
                    style="padding: 8px 16px; background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid #ef4444; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 0.85rem; transition: 0.2s;"
                    onmouseover="this.style.background='#ef4444'; this.style.color='white'"
                    onmouseout="this.style.background='rgba(239, 68, 68, 0.15)'; this.style.color='#ef4444'">
                    Reject < 50% </button>

                        <div style="width: 1px; height: 20px; background: #334155; margin: 0 5px;"></div>

                        <!-- Custom Threshold -->
                        <div
                            style="display: flex; align-items: center; background: #0f172a; border-radius: 6px; border: 1px solid #334155; padding: 2px 8px;">
                            <span style="font-size: 0.8rem; color: var(--text-dim); margin-right: 5px;">Custom: </span>
                            <input type="number" id="customThreshold" value="70"
                                style="width: 40px; background: transparent; border: none; color: var(--primary); font-weight: 700; outline: none; padding: 4px 0;">
                            <span style="font-size: 0.8rem; color: var(--text-dim);">%</span>
                        </div>
                        <button
                            onclick="runBatchAction(document.getElementById('customThreshold').value, 'gt', 'shortlisted')"
                            style="padding: 8px 12px; background: #334155; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.85rem; transition: 0.2s;"
                            onmouseover="this.style.background='#475569'"
                            onmouseout="this.style.background='#334155'">Apply</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>ATS Score</th>
                        <th>Skills</th>
                        <th>Projects</th>
                        <th>Hackathons</th>
                        <th>Internships</th>
                        <th>Exp</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="resultsTable"></tbody>
            </table>
        </div>
    </div>

    <!-- Resume Preview Modal -->
    <div id="resumeModal"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center; padding:2rem;">
        <div
            style="background:white; color:#0f172a; width:100%; max-width:800px; height:90%; border-radius:12px; padding:2.5rem; overflow-y:auto; position:relative; box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);">
            <button onclick="closeModal()"
                style="position:absolute; top:1rem; right:1rem; border:none; background:none; font-size:1.5rem; cursor:pointer;">&times;</button>
            <div id="resumeContent"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);

        async function fetchResults() {
            const body = {
                jobDescriptionId: urlParams.get('id'),
                minMatchScore: urlParams.get('minMatchScore'),
                minSkillCount: urlParams.get('minSkillCount'),
                minProjectCount: urlParams.get('minProjectCount'),
                minHackathonCount: urlParams.get('minHackathonCount'),
                minInternshipCount: urlParams.get('minInternshipCount'),
                minExperience: urlParams.get('minExperience'),
                manualSkill: urlParams.get('manualSkill'),
                top10: urlParams.get('top10') === 'true'
            };

            try {
                const res = await fetch('/api/filter', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Server error');
                }

                if (!Array.isArray(data)) {
                    console.error("Expected array but got:", data);
                    throw new Error("Invalid response format from server");
                }

                const candidates = data;
                if (urlParams.get('top10')) {
                    document.getElementById('countMsg').textContent = `Showing Top 10 Candidates (Filters Ignored)`;
                } else {
                    document.getElementById('countMsg').textContent = `Found ${candidates.length} matching candidates`;
                }

                // Calculate Analytics
                const total = candidates.length;
                let avg = 0;
                let high = 0;
                const skillMap = {};

                if (total > 0) {
                    const sum = candidates.reduce((acc, c) => {
                        if (c.matchScore > high) high = c.matchScore;
                        if (c.skills && Array.isArray(c.skills)) {
                            c.skills.forEach(skill => {
                                skillMap[skill] = (skillMap[skill] || 0) + 1;
                            });
                        }
                        return acc + c.matchScore;
                    }, 0);
                    avg = Math.round(sum / total);
                }

                let commonSkill = 'N/A';
                let maxCount = 0;
                for (const skill in skillMap) {
                    if (skillMap[skill] > maxCount) {
                        maxCount = skillMap[skill];
                        commonSkill = skill;
                    }
                }

                document.getElementById('stat-total').textContent = total;
                document.getElementById('stat-avg').textContent = `${avg}%`;
                document.getElementById('stat-high').textContent = `${high}%`;
                document.getElementById('stat-skill').textContent = commonSkill === 'N/A' ? 'N/A' : (commonSkill.length > 15 ? commonSkill.substring(0, 12) + '...' : commonSkill);

                const table = document.getElementById('resultsTable');
                if (candidates.length === 0) {
                    table.innerHTML = `
                        <tr>
                            <td colspan="8" style="text-align:center; padding:4rem;">
                                <div style="font-size: 1.2rem; margin-bottom: 2rem; color: var(--text-dim);">
                                    No candidates match your strict filters.
                                </div>
                                <div style="display: flex; gap: 1rem; justify-content: center;">
                                    <button onclick="relaxFilters()" style="width: auto; padding: 0.8rem 1.5rem; background: var(--primary); color: #010409; font-weight: 700; border-radius: 8px; border: none; cursor: pointer;">
                                        Relax Filters (-20%)
                                    </button>
                                    <button onclick="editFilters()" style="width: auto; padding: 0.8rem 1.5rem; background: #334155; color: white; font-weight: 700; border-radius: 8px; border: none; cursor: pointer;">
                                        Edit Filters
                                    </button>
                                    <button onclick="showTop10()" style="width: auto; padding: 0.8rem 1.5rem; background: var(--secondary); color: white; font-weight: 700; border-radius: 8px; border: none; cursor: pointer;">
                                        Show Top 10 Anyway
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                    return;
                }

                table.innerHTML = candidates.map(c => `
                    <tr style="transition: background 0.2s;" onmouseover="this.style.background='rgba(16, 185, 129, 0.05)'" onmouseout="this.style.background='transparent'">
                        <td>
                            <div style="font-weight: 600;">${c.name}</div>
                            <div style="font-size: 0.7rem; color: var(--text-dim);">${c.email}</div>
                        </td>
                        <td><span class="score">${c.matchScore}%</span></td>
                        <td><span class="count-badge">${c.skillCount}</span></td>
                        <td><span class="count-badge">${c.projectCount}</span></td>
                        <td><span class="count-badge">${c.hackathonCount}</span></td>
                        <td><span class="count-badge">${c.internshipCount}</span></td>
                        <td>${c.experience} yrs</td>
                        <td>
                            <span class="status-badge-${c.status || 'pending'}" style="
                                padding: 4px 8px;
                                border-radius: 12px;
                                font-size: 0.75rem;
                                font-weight: 600;
                                text-transform: capitalize;
                                background: ${c.status === 'shortlisted' ? 'rgba(16, 185, 129, 0.2)' : c.status === 'rejected' ? 'rgba(239, 68, 68, 0.2)' : 'rgba(148, 163, 184, 0.2)'};
                                color: ${c.status === 'shortlisted' ? '#10b981' : c.status === 'rejected' ? '#ef4444' : '#94a3b8'};
                            ">
                                ${c.status || 'pending'}
                            </span>
                        </td>
                        <td>
                            <div style="display: flex; gap: 5px;">
                                <button onclick='openDetails(${JSON.stringify(c).replace(/'/g, "&apos;")})' style="padding:4px 8px; font-size:0.7rem; background:#334155; color:white; cursor:pointer; border-radius:4px; border:none;">View</button>
                                <button onclick='updateStatus("${c._id}", "shortlist")' style="padding:4px 8px; font-size:0.7rem; background:var(--primary); color:#010409; cursor:pointer; border-radius:4px; border:none;">Shortlist</button>
                                <button onclick='updateStatus("${c._id}", "reject")' style="padding:4px 8px; font-size:0.7rem; background:#ef4444; color:white; cursor:pointer; border-radius:4px; border:none;">Reject</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error("Fetch Error:", err);
                document.getElementById('countMsg').textContent = `Error: ${err.message}`;
            }
        }

        function openDetails(cand) {
            const modal = document.getElementById('resumeModal');
            const content = document.getElementById('resumeContent');

            content.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: start; border-bottom: 2px solid #0f172a; padding-bottom: 1rem; margin-bottom: 2rem;">
                    <div>
                        <h1 style="margin:0; font-size:2rem;">${cand.name}</h1>
                        <p style="color:#64748b; font-size:1rem; margin-top:0.5rem;">${cand.email}</p>
                        <div style="margin-top: 10px;">
                            <span style="padding: 4px 12px; border-radius: 20px; font-weight: 700; font-size: 0.8rem; background: ${cand.status === 'shortlisted' ? 'rgba(16, 185, 129, 0.1)' : cand.status === 'rejected' ? 'rgba(239, 68, 68, 0.1)' : 'rgba(148, 163, 184, 0.1)'}; color: ${cand.status === 'shortlisted' ? '#10b981' : cand.status === 'rejected' ? '#ef4444' : '#94a3b8'}; border: 1px solid currentColor;">
                                ${cand.status.toUpperCase()}
                            </span>
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-size: 0.8rem; color: #64748b; text-transform: uppercase; font-weight: 700;">ATS Score</div>
                        <div style="font-size: 3rem; font-weight: 800; color: var(--primary); line-height: 1;">${cand.matchScore}%</div>
                    </div>
                </div>

                <div style="margin-bottom: 2rem;">
                    <h2 style="color:#0f172a; border-bottom:1px solid #e2e8f0; padding-bottom:0.5rem; font-size: 1.1rem;">AI Candidate Summary</h2>
                    <div id="aiSummary" style="margin-top: 1rem; color: #475569; font-style: italic; line-height: 1.5; padding: 1.5rem; background: rgba(16, 185, 129, 0.05); border-radius: 8px; border: 1px dashed var(--primary); font-size: 1.05rem;">
                        <div class="shimmer" style="height: 1rem; width: 100%; background: #e2e8f0; margin-bottom: 0.5rem;">Generating AI summary...</div>
                        <div class="shimmer" style="height: 1rem; width: 80%; background: #e2e8f0;"></div>
                    </div>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem;">
                    <section>
                        <h2 style="color:#0f172a; border-bottom:1px solid #e2e8f0; padding-bottom:0.5rem; font-size: 1.1rem;">Technical Skills</h2>
                        <div style="display:flex; flex-wrap:wrap; gap:6px; margin-top:1rem;">
                            ${cand.skills.map(s => `<span style="background:#f1f5f9; padding:4px 10px; border-radius:4px; border:1px solid #cbd5e1; font-size: 0.85rem; font-weight:600;">${s}</span>`).join('')}
                        </div>
                    </section>

                    <section>
                        <h2 style="color:#0f172a; border-bottom:1px solid #e2e8f0; padding-bottom:0.5rem; font-size: 1.1rem;">Experience & Education</h2>
                        <div style="margin-top: 1rem;">
                            <div style="font-size: 1.1rem; font-weight: 700; color: #1e293b;">${cand.experience} Years of Experience</div>
                            <div style="margin-top: 5px; color: #64748b;">${cand.education || 'Education info not extracted'}</div>
                            <div style="margin-top: 15px; display: flex; gap: 10px;">
                                <div style="background: #f8fafc; padding: 10px; border-radius: 8px; flex: 1; text-align: center; border: 1px solid #e2e8f0;">
                                    <div style="font-size: 1.2rem; font-weight: 800; color: #0f172a;">${cand.internshipCount}</div>
                                    <div style="font-size: 0.7rem; color: #64748b; text-transform: uppercase;">Internships</div>
                                </div>
                                <div style="background: #f8fafc; padding: 10px; border-radius: 8px; flex: 1; text-align: center; border: 1px solid #e2e8f0;">
                                    <div style="font-size: 1.2rem; font-weight: 800; color: #0f172a;">${cand.hackathonCount}</div>
                                    <div style="font-size: 0.7rem; color: #64748b; text-transform: uppercase;">Hackathons</div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>

                <section style="margin-bottom: 2rem;">
                    <h2 style="color:#0f172a; border-bottom:1px solid #e2e8f0; padding-bottom:0.5rem; font-size: 1.1rem;">Projects (${cand.projectCount})</h2>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1rem;">
                        ${cand.projects.map(p => `
                            <div style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                                <h3 style="margin: 0; font-size: 0.95rem; color: #1e293b;">${p}</h3>
                            </div>
                        `).join('')}
                    </div>
                </section>
                
                <div style="display: flex; gap: 10px; padding-top: 2rem; border-top: 1px solid #e2e8f0; justify-content: end;">
                    <a href="/${cand.resumePath}" target="_blank" style="text-decoration: none; padding: 12px 24px; background: #334155; color: white; border-radius: 8px; font-weight: 700; transition: 0.2s;">View Original Resume</a>
                    <button onclick='updateStatus("${cand._id}", "shortlist"); closeModal();' style="padding: 12px 24px; background: var(--primary); color: #010409; border-radius: 8px; border: none; font-weight: 700; cursor: pointer;">Shortlist Candidate</button>
                    <button onclick='updateStatus("${cand._id}", "reject"); closeModal();' style="padding: 12px 24px; background: #ef4444; color: white; border-radius: 8px; border: none; font-weight: 700; cursor: pointer;">Reject Candidate</button>
                </div>
            `;

            modal.style.display = 'flex';

            // Fetch AI Summary asynchronously
            fetch(`/api/candidates/${cand._id}/summary`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('aiSummary').textContent = `"${data.summary}"`;
                })
                .catch(err => {
                    document.getElementById('aiSummary').textContent = "AI Summary unavailable.";
                });
        }

        function closeModal() {
            document.getElementById('resumeModal').style.display = 'none';
        }

        function relaxFilters() {
            const params = new URLSearchParams(window.location.search);
            const keys = ['minMatchScore', 'minSkillCount', 'minProjectCount', 'minHackathonCount', 'minInternshipCount', 'minExperience'];

            keys.forEach(key => {
                const val = parseFloat(params.get(key));
                if (!isNaN(val)) {
                    // Reduce by 20%, floor it if it's a count, or round it
                    const newVal = Math.max(0, Math.floor(val * 0.8));
                    params.set(key, newVal);
                }
            });
            window.location.search = params.toString();
        }

        function editFilters() {
            const params = new URLSearchParams(window.location.search);
            window.location.href = `filter.html?${params.toString()}`;
        }

        function showTop10() {
            const params = new URLSearchParams(window.location.search);
            params.set('top10', 'true');
            window.location.search = params.toString();
        }

        async function updateStatus(id, action) {
            try {
                const res = await fetch(`/api/candidates/${id}/${action}`, { method: 'POST' });
                if (!res.ok) throw new Error('Update failed');
                // Refresh data
                fetchResults();
            } catch (err) {
                alert("Status Update Error: " + err.message);
            }
        }

        async function exportCSV() {
            const body = {
                jobDescriptionId: urlParams.get('id'),
                minMatchScore: urlParams.get('minMatchScore'),
                minSkillCount: urlParams.get('minSkillCount'),
                minProjectCount: urlParams.get('minProjectCount'),
                minHackathonCount: urlParams.get('minHackathonCount'),
                minInternshipCount: urlParams.get('minInternshipCount'),
                minExperience: urlParams.get('minExperience'),
                manualSkill: urlParams.get('manualSkill'),
                top10: urlParams.get('top10') === 'true'
            };

            try {
                const res = await fetch('/api/filter/export', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                if (!res.ok) throw new Error('Export failed');

                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Vero_Candidates_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (err) {
                alert("Export Error: " + err.message);
            }
        }

        async function runBatchAction(threshold, operator, status) {
            const jdId = urlParams.get('id');
            if (!confirm(`Are you sure you want to ${status} all candidates with score ${operator === 'gt' ? '>' : '<'} ${threshold}%?`)) return;

            try {
                const res = await fetch('/api/candidates/batch-status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        jobDescriptionId: jdId,
                        threshold,
                        operator,
                        status
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                alert(data.message);
                fetchResults(); // Refresh table
            } catch (err) {
                alert("Batch Update Error: " + err.message);
            }
        }
