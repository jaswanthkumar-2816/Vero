<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vero AI - Dashboard</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #10b981;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .btn-back {
            display: inline-block;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #334155;
            text-align: center;
        }

        .stat-val {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-label {
            color: var(--text-dim);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            margin-top: 0.5rem;
        }

        .table-container {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid #334155;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            background: #334155;
            padding: 1rem;
            color: var(--text-dim);
            font-size: 0.875rem;
        }

        td {
            padding: 1rem;
            border-top: 1px solid #334155;
            font-size: 0.95rem;
        }

        .score {
            font-weight: 800;
            color: var(--primary);
        }

        .status-pill {
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .shortlisted {
            background: #065f46;
            color: #34d399;
        }

        .rejected {
            background: #7f1d1d;
            color: #f87171;
        }

        .pending {
            background: #374151;
            color: #94a3b8;
        }

        .jd-info {
            margin-bottom: 2rem;
            padding: 1rem;
            background: rgba(16, 185, 129, 0.05);
            border-left: 4px solid var(--primary);
            border-radius: 4px;
        }

        .filters {
            margin-bottom: 1.5rem;
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            background: #334155;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
        }

        .filter-btn.active {
            background: var(--primary);
            color: #0f172a;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="index.html" class="btn-back">← Back to Upload</a>
        <header>
            <div>
                <h1 id="jdTitle">Loading Job Data...</h1>
                <p id="jdId" style="color: var(--text-dim); font-size: 0.8rem;"></p>
            </div>
            <div class="filters">
                <button onclick="fetchData('all')" class="filter-btn active" id="btn-all">All</button>
                <button onclick="fetchData('shortlisted')" class="filter-btn" id="btn-shortlisted">Shortlisted</button>
                <button onclick="fetchData('rejected')" class="filter-btn" id="btn-rejected">Rejected</button>
            </div>
        </header>

        <div id="jdSummary" class="jd-info"></div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-val" id="stat-total">0</div>
                <div class="stat-label">Total Candidates</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="stat-shortlisted">0</div>
                <div class="stat-label">Shortlisted</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="stat-avg">0%</div>
                <div class="stat-label">Avg Match Score</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="stat-top">0%</div>
                <div class="stat-label">Highest Score</div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Candidate Name</th>
                        <th>Score</th>
                        <th>Skills</th>
                        <th>Experience</th>
                        <th>Education</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="candidateTable">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const jdId = urlParams.get('id');

        async function init() {
            if (!jdId) return alert("No Job ID found");

            // 1. Fetch JD Details
            const jdRes = await fetch(`/api/job-description/${jdId}/preview`);
            const jdData = await jdRes.json();
            document.getElementById('jdTitle').textContent = jdData.title;
            document.getElementById('jdId').textContent = `JOB ID: ${jdData._id}`;
            document.getElementById('jdSummary').innerHTML = `<strong>Required Skills:</strong> ${jdData.extractedSkills?.join(', ') || 'N/A'} | <strong>Target Exp:</strong> ${jdData.extractedExperience || 0} Years`;

            // 2. Fetch Analytics & Candidates
            fetchData('all');
        }

        async function fetchData(statusFilter) {
            // Update UI buttons
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${statusFilter}`).classList.add('active');

            // Fetch Stats
            const dashRes = await fetch(`/api/dashboard/${jdId}`);
            const dashData = await dashRes.json();

            const stats = dashData.analytics;
            document.getElementById('stat-total').textContent = stats.totalCandidates;
            document.getElementById('stat-shortlisted').textContent = stats.shortlistedCount;
            document.getElementById('stat-avg').textContent = `${Math.round(stats.averageScore)}%`;
            document.getElementById('stat-top').textContent = `${dashData.topCandidates[0]?.matchScore || 0}%`;

            // Fetch & Filter Candidates Table
            // Note: Our backend /api/filter handles filtering
            const filterBody = { jobDescriptionId: jdId };
            const candRes = await fetch(`/api/filter`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(filterBody)
            });
            let candidates = await candRes.json();

            if (statusFilter !== 'all') {
                candidates = candidates.filter(c => c.status === statusFilter);
            }

            const table = document.getElementById('candidateTable');
            table.innerHTML = candidates.map(c => `
                <tr>
                    <td>
                        <div style="font-weight: 600;">${c.name}</div>
                        <div style="color: var(--text-dim); font-size: 0.75rem;">${c.email}</div>
                    </td>
                    <td><span class="score">${c.matchScore}%</span></td>
                    <td><div style="max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${c.skills.join(', ')}</div></td>
                    <td>${c.experience}</td>
                    <td>${c.education || 'N/A'}</td>
                    <td><span class="status-pill ${c.status}">${c.status}</span></td>
                </tr>
            `).join('');
        }

        init();
    </script>
</body>

</html>
